name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Fix gradle wrapper
      run: |
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        EOF

        cat > gradlew << 'EOF'
        #!/bin/sh
        SCRIPT_DIR=$(dirname "$0")
        exec java \
          -Xmx64m \
          -Xms64m \
          -classpath "$SCRIPT_DIR/gradle/wrapper/gradle-wrapper.jar" \
          org.gradle.wrapper.GradleWrapperMain "$@"
        EOF
        chmod +x gradlew

    - name: Fix build.gradle
      run: |
        cat > build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.teacherapp.parentcomm'
            compileSdk 34
            defaultConfig {
                applicationId "com.teacherapp.parentcomm"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
            buildFeatures {
                viewBinding true
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
            implementation 'androidx.cardview:cardview:1.0.0'
        }
        EOF

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ParentCommManager-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
