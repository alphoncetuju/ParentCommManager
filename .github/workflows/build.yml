name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.4
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Android build tools
      run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Write build.gradle
      run: |
        cat > build.gradle << 'GRADLE'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        GRADLE

    - name: Write app/build.gradle
      run: |
        cat > app/build.gradle << 'GRADLE'
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.teacherapp.parentcomm'
            compileSdk 34
            defaultConfig {
                applicationId "com.teacherapp.parentcomm"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
            buildFeatures {
                viewBinding true
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
            implementation 'androidx.cardview:cardview:1.0.0'
        }
        GRADLE

    - name: Write settings.gradle
      run: |
        cat > settings.gradle << 'GRADLE'
        rootProject.name = "ParentCommManager"
        include ':app'
        GRADLE

    - name: Write gradle.properties
      run: |
        cat > gradle.properties << 'PROPS'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        PROPS

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ParentCommManager-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
